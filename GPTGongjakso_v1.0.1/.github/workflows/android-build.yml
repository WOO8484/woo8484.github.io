name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug:
    name: Build & Test (debug)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build and test
        shell: bash
        run: |
          set -o pipefail
          ./gradlew clean test assembleDebug --stacktrace --no-daemon | tee build-log.txt

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gptgongjakso-v1.0.1-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gptgongjakso-v1.0.1-test-results
          path: |
            app/build/reports/tests/**
            app/build/test-results/**
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gptgongjakso-v1.0.1-build-log
          path: build-log.txt
          if-no-files-found: warn

  build-release-signed:
    name: Build signed release (optional)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-debug
    if: ${{ github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate signing secrets and decode keystore
        id: signing
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ] || \
             [ -z "$RELEASE_KEYSTORE_PASSWORD" ] || \
             [ -z "$RELEASE_KEY_ALIAS" ] || \
             [ -z "$RELEASE_KEY_PASSWORD" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "서명용 Secret 4개가 모두 없어 release 빌드를 건너뜁니다."
            exit 0
          fi

          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
          test -s "$RUNNER_TEMP/release.jks"
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Grant execute permission for gradlew
        if: steps.signing.outputs.ready == 'true'
        run: chmod +x ./gradlew

      - name: Assemble signed release
        if: steps.signing.outputs.ready == 'true'
        env:
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Upload signed release APK
        if: steps.signing.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gptgongjakso-v1.0.1-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
