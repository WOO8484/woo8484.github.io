name: Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Clean, test, and build
        run: ./gradlew clean test assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GPT-Gongjakso-debug-APK
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-and-build-reports
          path: |
            app/build/reports/**
            app/build/test-results/**
