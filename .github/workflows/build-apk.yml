name: Android APK 자동 빌드

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 저장소 내려받기
        uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK 설정
        uses: android-actions/setup-android@v3

      - name: Android SDK 구성요소 설치
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Gradle 8.7 설정
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: 프로젝트 검사
        run: |
          test -f settings.gradle.kts
          test -f app/build.gradle.kts
          test -f app/src/main/AndroidManifest.xml

      - name: Debug APK 빌드
        run: gradle --no-daemon clean assembleDebug

      - name: APK 존재 여부 확인
        run: |
          ls -lh app/build/outputs/apk/debug/
          test -f app/build/outputs/apk/debug/app-debug.apk

      - name: SHA-256 생성
        run: sha256sum app/build/outputs/apk/debug/app-debug.apk > app/build/outputs/apk/debug/app-debug.apk.sha256

      - name: APK 다운로드 파일 등록
        uses: actions/upload-artifact@v4
        with:
          name: GPT-공작소-네이버도우미-debug-apk
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/debug/app-debug.apk.sha256
          if-no-files-found: error
          retention-days: 30
