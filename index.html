<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🦑 두족류 낚시 가이드 - 울산~남해</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <style>
        body { font-family: 'Noto Sans KR', system-ui, sans-serif; }
        .section { display: none; }
        .section.active { display: block; }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2937;
            color: white;
            padding: 12px 20px;
            border-radius: 9999px;
            font-size: 14px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            z-index: 9999;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .pull-to-refresh {
            text-align: center;
            padding: 8px;
            color: #64748b;
            font-size: 12px;
            display: none;
        }
    </style>
</head>
<body class="bg-white text-slate-800 max-w-[480px] mx-auto">
    
    <!-- Header -->
    <div class="sticky top-0 z-50 bg-white border-b px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-x-3">
            <div class="w-11 h-11">
                <svg viewBox="0 0 48 48" class="w-full h-full"><ellipse cx="24" cy="20" rx="11" ry="14" fill="#06b6d4"/></svg>
            </div>
            <div>
                <h1 class="text-2xl font-bold">두족류 낚시 가이드</h1>
                <p class="text-[10px] text-slate-500">울산 ~ 남해 • v2.4</p>
            </div>
        </div>
        <div onclick="installPWA()" class="bg-[#06b6d4] text-white text-xs px-3 py-1.5 rounded-2xl cursor-pointer">
            <i class="fa-solid fa-download mr-1"></i> 앱 설치
        </div>
    </div>

    <!-- Pull to Refresh Indicator -->
    <div id="pull-indicator" class="pull-to-refresh">
        <i class="fa-solid fa-sync fa-spin mr-1"></i> 새로고침 중...
    </div>

    <div class="pb-20">
        <!-- HOME -->
        <section id="home" class="section active px-4 pt-4">
            <h2 class="text-3xl font-bold mb-4">오늘의 낚시 컨디션</h2>
            
            <div onclick="switchSection('weather')" class="bg-white border rounded-3xl p-5 mb-6 cursor-pointer active:bg-slate-50 transition-colors">
                <div class="flex justify-between">
                    <div>
                        <div id="home-temp" class="text-5xl font-bold">—</div>
                        <div id="home-desc" class="text-slate-600">날씨 로딩 중...</div>
                    </div>
                    <div id="home-icon" class="text-6xl">🌡️</div>
                </div>
                <div class="mt-4 pt-4 border-t grid grid-cols-2 text-sm">
                    <div>바람: <span id="home-wind">—</span></div>
                    <div>파도: <span id="home-wave">—</span></div>
                </div>
            </div>
        </section>

        <!-- WEATHER -->
        <section id="weather" class="section px-4 pt-4">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-2xl font-bold">날씨 &amp; 조석</h2>
                <button onclick="loadWeather(true)" 
                        class="text-sm px-3 py-1.5 bg-slate-100 rounded-2xl flex items-center gap-x-1 active:bg-slate-200">
                    <i class="fa-solid fa-sync text-xs"></i>
                    <span>새로고침</span>
                </button>
            </div>
            <div id="weather-content" class="bg-white border rounded-3xl p-5 min-h-[120px]">
                로딩 중...
            </div>
        </section>

        <!-- SPECIES -->
        <section id="species" class="section px-4 pt-4 pb-24">
            <h2 class="text-2xl font-bold mb-4">두족류 도감</h2>
            <div id="species-grid" class="grid grid-cols-2 gap-3"></div>
        </section>

        <!-- GUIDE -->
        <section id="guide" class="section px-4 pt-4">
            <h2 class="text-2xl font-bold mb-4">가이드북</h2>
            <div class="flex bg-slate-100 rounded-2xl p-1 mb-4">
                <div onclick="switchGuideTab(0)" class="flex-1 text-center py-2 rounded-[14px] cursor-pointer font-medium bg-white" id="guide-tab-0">낚시 방법</div>
                <div onclick="switchGuideTab(1)" class="flex-1 text-center py-2 rounded-[14px] cursor-pointer font-medium" id="guide-tab-1">매듭</div>
            </div>
            <div id="guide-content-0">
                <div class="bg-white border rounded-3xl p-5">도보 / 선상 정보</div>
            </div>
            <div id="guide-content-1" class="hidden">
                <div class="bg-white border rounded-3xl p-5">FG Knot + 영상 링크</div>
            </div>
        </section>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">
        <span id="toast-message"></span>
    </div>

    <!-- Bottom Nav -->
    <div class="fixed bottom-0 bg-white border-t w-full max-w-[480px] mx-auto z-50">
        <div class="grid grid-cols-4 text-center text-xs py-2">
            <div onclick="switchSection('home')" class="cursor-pointer py-1">🏠<br><span class="text-[10px]">홈</span></div>
            <div onclick="switchSection('weather')" class="cursor-pointer py-1">🌤️<br><span class="text-[10px]">날씨</span></div>
            <div onclick="switchSection('species')" class="cursor-pointer py-1">🦑<br><span class="text-[10px]">어종</span></div>
            <div onclick="switchSection('guide')" class="cursor-pointer py-1">📖<br><span class="text-[10px]">가이드</span></div>
        </div>
    </div>

    <script>
        // ==================== Toast System ====================
        function showToast(message, duration = 2500) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-message');
            
            toastMsg.textContent = message;
            toast.style.display = 'flex';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, duration);
        }

        // ==================== Pull to Refresh ====================
        let startY = 0;
        let isPulling = false;

        function initPullToRefresh() {
            const homeSection = document.getElementById('home');
            const indicator = document.getElementById('pull-indicator');

            homeSection.addEventListener('touchstart', (e) => {
                if (window.scrollY === 0) {
                    startY = e.touches[0].clientY;
                    isPulling = true;
                }
            });

            homeSection.addEventListener('touchmove', (e) => {
                if (!isPulling) return;
                const currentY = e.touches[0].clientY;
                const diff = currentY - startY;

                if (diff > 80) {
                    indicator.style.display = 'block';
                }
            });

            homeSection.addEventListener('touchend', (e) => {
                if (!isPulling) return;
                const currentY = e.changedTouches[0].clientY;
                const diff = currentY - startY;

                if (diff > 80) {
                    indicator.style.display = 'block';
                    loadWeather(true).finally(() => {
                        indicator.style.display = 'none';
                        showToast('날씨가 업데이트되었습니다');
                    });
                } else {
                    indicator.style.display = 'none';
                }
                isPulling = false;
            });
        }

        // ==================== Weather ====================
        async function loadWeather(showLoading = false) {
            const homeDesc = document.getElementById('home-desc');
            const weatherContent = document.getElementById('weather-content');

            if (showLoading) {
                homeDesc.textContent = '업데이트 중...';
                weatherContent.innerHTML = `<div class="flex items-center justify-center py-6 text-slate-400">
                    <i class="fa-solid fa-spinner fa-spin mr-2"></i> 불러오는 중...
                </div>`;
            }

            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=35.5394&longitude=129.3114&current=temperature_2m,wind_speed_10m,weather_code&timezone=Asia%2FSeoul');
                
                if (!res.ok) throw new Error('API 오류');

                const data = await res.json();
                const temp = Math.round(data.current.temperature_2m);
                const wind = Math.round(data.current.wind_speed_10m);
                const wave = wind > 15 ? "1.2~1.8m" : "0.6~1.0m";

                document.getElementById('home-temp').textContent = temp;
                document.getElementById('home-desc').textContent = "현재 날씨";
                document.getElementById('home-wind').textContent = wind + " km/h";
                document.getElementById('home-wave').textContent = wave;

                weatherContent.innerHTML = `
                    <div class="space-y-2">
                        <div class="flex justify-between">
                            <span class="text-slate-600">온도</span>
                            <span class="font-semibold text-lg">${temp}°C</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-slate-600">바람</span>
                            <span class="font-semibold">${wind} km/h</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-slate-600">파도</span>
                            <span class="font-semibold">${wave}</span>
                        </div>
                        <div class="pt-2 mt-2 border-t text-xs text-slate-500">
                            조석 정보: 만조 14:30경 (예시)
                        </div>
                    </div>
                `;

                if (showLoading) {
                    showToast('날씨 정보가 업데이트되었습니다');
                }

            } catch (e) {
                console.error('Weather error:', e);
                weatherContent.innerHTML = `
                    <div class="text-center py-4 text-red-500">
                        <i class="fa-solid fa-exclamation-triangle mb-2 text-xl"></i><br>
                        날씨 정보를 불러오지 못했습니다.<br>
                        <span class="text-xs">네트워크를 확인해주세요.</span>
                    </div>
                `;
                document.getElementById('home-desc').textContent = "로딩 실패";
            }
        }

        // ==================== Species ====================
        function renderSpecies() {
            const grid = document.getElementById('species-grid');
            const data = [
                {name:"주꾸미", emoji:"🐙", tip:"바닥 접촉"},
                {name:"갑오징어", emoji:"🦑", tip:"20~50cm 띄움"},
                {name:"문어", emoji:"🐙", tip:"강한 힘 주의"},
                {name:"한치", emoji:"🦑", tip:"선상 전문"},
                {name:"무늬오징어", emoji:"🦑", tip:"예민"}
            ];
            grid.innerHTML = data.map(s => `
                <div class="bg-white border rounded-3xl p-4 active:bg-slate-50 transition-colors">
                    <div class="text-5xl mb-2">${s.emoji}</div>
                    <div class="font-bold">${s.name}</div>
                    <div class="text-sm text-slate-600">${s.tip}</div>
                </div>
            `).join('');
        }

        // ==================== Navigation ====================
        function switchSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            if (id === 'weather') {
                loadWeather();
            }
        }

        function switchGuideTab(tab) {
            document.querySelectorAll('[id^="guide-content-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById('guide-content-' + tab).classList.remove('hidden');
        }

        function installPWA() {
            showToast('브라우저 메뉴 → "홈 화면에 추가"를 눌러주세요!');
        }

        // ==================== Service Worker ====================
        function checkForUpdate() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.ready.then(reg => {
                    reg.update();
                });
            }
        }

        function initServiceWorker() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => {
                        console.log('%c[SW] 등록 완료', 'color:#06b6d4');
                        
                        reg.addEventListener('updatefound', () => {
                            const newWorker = reg.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    showToast('새 버전이 있습니다. 앱을 다시 시작해주세요.', 4000);
                                }
                            });
                        });
                    })
                    .catch(err => console.error('SW 등록 실패:', err));
            }

            navigator.serviceWorker.addEventListener('controllerchange', () => {
                window.location.reload();
            });
        }

        // ==================== Init ====================
        function init() {
            renderSpecies();
            loadWeather();
            initPullToRefresh();
            initServiceWorker();
            checkForUpdate();

            console.log('%c[v2.4] Pull-to-Refresh + Toast + 개선된 캐싱 전략 적용 완료', 'color:#06b6d4');
            
            // 첫 실행 시 환영 토스트 (선택)
            setTimeout(() => {
                // showToast('앱이 시작되었습니다');
            }, 1500);
        }

        window.onload = init;
    </script>
</body>
</html>
