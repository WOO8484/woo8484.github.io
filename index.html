<!-- PWA Manifest (인라인) -->
<script>
  const manifestData = {
    name: "두낚이 - 두족류 낚시 가이드",
    short_name: "두낚이",
    description: "주꾸미·문어·한치·갑오징어 낚시 가이드 앱",
    start_url: "./",
    display: "standalone",
    background_color: "#ffffff",
    theme_color: "#0ea5e9",
    orientation: "portrait",
    icons: [
      { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%230ea5e9'/><text y='140' font-size='130' text-anchor='middle' x='96'>🦑</text></svg>", sizes: "192x192", type: "image/svg+xml" },
      { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='100' fill='%230ea5e9'/><text y='380' font-size='340' text-anchor='middle' x='256'>🦑</text></svg>", sizes: "512x512", type: "image/svg+xml" }
    ]
  };
  const blob = new Blob([JSON.stringify(manifestData)], { type: 'application/json' });
  const manifestURL = URL.createObjectURL(blob);
  document.addEventListener('DOMContentLoaded', () => {
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = manifestURL;
    document.head.appendChild(link);
  });
</script>

<script>
  // ==================== PWA ====================
  let deferredPrompt;

  function setupPWA() {
    // Service Worker 등록
    if ('serviceWorker' in navigator) {
      const swCode = `
        const CACHE = 'dunaki-v1';
        const ASSETS = [location.href];
        self.addEventListener('install', e => {
          e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
          self.skipWaiting();
        });
        self.addEventListener('activate', e => {
          e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k!==CACHE).map(k => caches.delete(k)))));
          self.clients.claim();
        });
        self.addEventListener('fetch', e => {
          e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match(e.request))));
        });
      `;
      const blob = new Blob([swCode], { type: 'application/javascript' });
      const swURL = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swURL).catch(() => {});
    }

    const installBtn = document.getElementById('install-btn');
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.classList.remove('hidden');
      installBtn.classList.add('flex');
    });
    window.addEventListener('appinstalled', () => {
      installBtn.classList.add('hidden');
      deferredPrompt = null;
    });
  }

  function installPWA() {
    if (!deferredPrompt) {
      alert('브라우저 메뉴 → "홈 화면에 추가"를 눌러주세요!');
      return;
    }
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then((r) => {
      if (r.outcome === 'accepted') document.getElementById('install-btn').classList.add('hidden');
      deferredPrompt = null;
    });
  }

  // ==================== APP DATA ====================
  const APP_DATA = {
    species: [
      { id: "jukkumi", name: "주꾸미", emoji: "🦑", season: "3~11월 (가을 피크)",
        gradient: "from-pink-500 to-rose-500",
        desc: "한국에서 가장 인기 있는 두족류 낚시 대상입니다.",
        boat: "선상 에기 지깅 정석. PE 0.8~1.0호 + 2.0~2.5호 에기 + 가벼운 봉돌.",
        shore: "도보권에서도 가능하지만 선상에 비해 조과가 떨어집니다.",
        rig: "메인라인 → 도래 → 리더(1.5~2호) → 에기. 봉돌은 상황에 따라 조절.",

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.remove('hidden');
    toast.classList.add('flex', 'items-center', 'justify-center');
    clearTimeout(toast._timer);

      toast.classList.remove('flex', 'items-center', 'justify-center');
    }, 2300);

    document.querySelectorAll('.nav-item').forEach(el => {
      el.classList.remove('nav-active');

    if (pageId === 'page-spots')   renderSpots();
    if (pageId === 'page-charter') renderCharters();
  }

  // ==================== WEATHER ====================
  async function getWeather() {
    const container = document.getElementById('weather-content');
    if (!navigator.geolocation) {
      container.innerHTML = `<div class="text-red-500 text-sm py-3">위치 기능을 지원하지 않습니다.</div>`;
      return;
    }
    container.innerHTML = `<div class="flex justify-center py-6 text-3xl">⏳</div>`;

    navigator.geolocation.getCurrentPosition(async (pos) => {
      try {
        const { latitude: lat, longitude: lon } = pos.coords;
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,wind_speed_10m,precipitation,rain,is_day&timezone=Asia%2FSeoul`);
        const data = await res.json();
        const cur = data.current;

        const temp  = Math.round(cur.temperature_2m);
        const wind  = Math.round(cur.wind_speed_10m);
        const precip = cur.precipitation || cur.rain || 0;
        const isDay = cur.is_day !== undefined ? cur.is_day : (new Date().getHours() >= 6 && new Date().getHours() < 20 ? 1 : 0);

        let score = 62;
        if (wind < 12) score += 20; else if (wind > 26) score -= 25;
        if (precip > 0.5) score -= 15;
        if (cur.weather_code <= 2) score += 10;
        score = Math.max(30, Math.min(95, score));

        let icon = '🌤️', desc = '좋음';
        if      (cur.weather_code >= 61) { icon = '🌧️'; desc = '비'; }
        else if (cur.weather_code >= 45) { icon = '🌫️'; desc = '안개'; }
        else if (cur.weather_code >= 3)  { icon = '☁️';  desc = '흐림'; }
        else if (isDay)                  { icon = '☀️';  desc = '맑음'; }
        else                             { icon = '🌙';  desc = '맑음(야간)'; }

        const scoreColor = score > 75 ? 'text-emerald-600' : score > 55 ? 'text-amber-600' : 'text-red-500';
        const scoreMsg   = score > 75 ? '선상 낚시하기 좋은 날씨입니다!' : score > 55 ? '조심스럽게 출조하세요' : '바람/비 주의!';

        container.innerHTML = `
          <div class="flex justify-between items-start">
            <div><div class="text-sm text-slate-500">현재 위치</div>
              <div class="text-5xl font-bold text-slate-900 mt-1">${temp}°</div></div>
            <div class="text-right"><div class="text-6xl mb-1">${icon}</div>
              <div class="text-sm text-slate-600">${desc}</div></div>
          </div>
          <div class="mt-5 grid grid-cols-3 gap-3">
            <div class="metric rounded-2xl p-3 text-center">
              <div class="text-xs text-slate-500">바람</div>
              <div class="font-semibold">${wind} km/h</div>
            </div>
            <div class="metric rounded-2xl p-3 text-center">
              <div class="text-xs text-slate-500">낚시 지수</div>
              <div class="font-extrabold text-2xl ${scoreColor}">${score}</div>
            </div>
            <div class="metric rounded-2xl p-3 text-center">
              <div class="text-xs text-slate-500">강수</div>
              <div class="font-semibold">${precip}mm</div>
            </div>
          </div>
          <div class="text-center mt-4 text-xs ${scoreColor} font-medium">${scoreMsg}</div>`;
      } catch {
        container.innerHTML = `<div class="text-red-500 text-sm py-4 text-center">날씨 정보를 불러오지 못했습니다.<br>
          <button onclick="getWeather()" class="underline text-sky-600 mt-1">다시 시도</button></div>`;
      }
    }, () => {
      container.innerHTML = `<div class="text-sm text-center py-4 text-slate-500">위치 접근이 거부되었습니다.<br>설정에서 위치 권한을 허용해주세요.</div>`;
    });
  }

  // ==================== SPOTS ====================
  function loadSavedSpots() {
    try { savedSpots = JSON.parse(localStorage.getItem('dunaki_saved_spots_v1') || '[]'); }
    catch { savedSpots = []; }
  }

  function saveSpotsToStorage() {
    try { localStorage.setItem('dunaki_saved_spots_v1', JSON.stringify(savedSpots)); } catch {}
  }

  function toggleSpotSave(spotId, e) {
    e.stopImmediatePropagation();
    const idx = savedSpots.indexOf(spotId);
    if (idx === -1) { savedSpots.push(spotId); showToast('포인트가 저장되었어요!'); }
    else            { savedSpots.splice(idx, 1); showToast('저장이 해제되었어요'); }
    saveSpotsToStorage();
    renderSpots();
  }

  function renderSpots(filtered = null) {
    const container = document.getElementById('spots-list');
    container.innerHTML = '';
    let list = filtered || APP_DATA.spots;
    if (currentSpotFilter !== 'all') list = list.filter(s => s.type === currentSpotFilter);
    if (list.length === 0) {
      container.innerHTML = `<div class="text-center py-8 text-sm text-slate-400">조건에 맞는 포인트가 없습니다.</div>`;
      return;
    }
    list.forEach(spot => {
      const isSaved = savedSpots.includes(spot.id);
      const div = document.createElement('div');
      div.className = 'spot-card bg-white border border-slate-100 rounded-3xl p-4 cursor-pointer';
      div.innerHTML = `
        <div class="flex justify-between">
          <div><div class="font-semibold">${spot.name}</div>
            <div class="flex items-center gap-x-2 mt-1">
              <span class="text-xs px-2.5 py-0.5 rounded-2xl ${spot.type==='선상'?'bg-blue-100 text-blue-700':'bg-emerald-100 text-emerald-700'}">${spot.type}</span>
              <span class="text-xs text-slate-500">${spot.region}</span>
            </div></div>
          <button class="heart-btn p-2" onclick="toggleSpotSave(${spot.id}, event)">${isSaved ? '❤️' : '🤍'}</button>
        </div>
        <div class="text-sm text-slate-600 mt-3">${spot.desc}</div>`;
      div.onclick = () => showSpotDetail(spot);
      container.appendChild(div);
    });
  }

  function filterSpotsByType(type) {
    currentSpotFilter = type;
    document.querySelectorAll('.spot-filter-btn').forEach(b => {
      const isActive = b.dataset.type === type;
      b.className = `spot-filter-btn px-4 py-1.5 text-xs rounded-3xl transition-all ${isActive ? 'bg-sky-600 text-white' : 'bg-white border text-slate-600'}`;
    });
    renderSpots();
  }

  // ==================== CATCH LOG ====================
  function loadCatches() {
    try { catches = JSON.parse(localStorage.getItem('dunaki_catches_v2') || '[]'); }
    catch { catches = []; }
  }

  function saveCatchesToStorage() {
    try { localStorage.setItem('dunaki_catches_v2', JSON.stringify(catches)); }
    catch { showToast('저장에 실패했습니다 (저장 공간 부족)'); }
  }

  function renderLog() {
    document.getElementById('log-total').textContent = catches.length;
    document.getElementById('log-count').textContent = catches.length;

    const favEl      = document.getElementById('log-favorite');
    const quickFavEl = document.getElementById('quick-favorite');

    if (catches.length > 0) {
      const map = {};
      catches.forEach(c => map[c.speciesId] = (map[c.speciesId] || 0) + 1);
      const topId = Object.keys(map).sort((a,b) => map[b]-map[a])[0];
      const sp = APP_DATA.species.find(s => s.id === topId);
      const display = sp ? `${sp.emoji} ${sp.name}` : '알 수 없음';
      favEl.textContent = quickFavEl.textContent = display;
    } else {
      favEl.textContent = quickFavEl.textContent = '아직 없어요';
    }

    document.getElementById('quick-catch-count').textContent = catches.length;
    const list = document.getElementById('log-list');
    list.innerHTML = '';

    if (catches.length === 0) {
      list.innerHTML = `<div class="text-center py-8 text-sm text-slate-400">아직 기록이 없어요. 첫 기록을 추가해보세요!</div>`;
      return;
    }

    [...catches].sort((a,b) => b.date.localeCompare(a.date)).forEach(item => {
      const sp = APP_DATA.species.find(s => s.id === item.speciesId);
      if (!sp) return;
      const div = document.createElement('div');
      div.className = 'bg-white border border-slate-100 rounded-3xl p-4 flex gap-x-3 items-center';
      div.innerHTML = `
        <div class="w-11 h-11 flex-shrink-0 rounded-2xl flex items-center justify-center bg-purple-50">
          ${getFishSVG(sp.id)}
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex justify-between items-start">
            <div class="font-semibold">${sp.name}</div>
            <div class="text-xs text-slate-400 ml-2 flex-shrink-0">${item.date}</div>
          </div>
          <div class="text-sm text-slate-600 mt-0.5">
            ${[item.size ? item.size+'cm' : '', item.weight ? item.weight+'g' : '', item.spot || ''].filter(Boolean).join(' · ')}
          </div>
          ${item.notes ? `<div class="text-xs text-slate-500 mt-1 line-clamp-1">${item.notes}</div>` : ''}
        </div>
        <div class="log-card-actions flex-shrink-0">
          <button onclick="editCatch(${item.id}, event)" class="p-1.5 text-base">✏️</button>
          <button onclick="deleteCatch(${item.id}, event)" class="p-1.5 text-base">🗑️</button>
        </div>`;
      list.appendChild(div);
    });
  }

  // ① 기록 추가/수정 통합 모달
  function showCatchModal(presetSpeciesId = null) {
    const modal  = document.getElementById('catch-modal');
    const select = document.getElementById('catch-species');
    select.innerHTML = APP_DATA.species.map(s =>
      `<option value="${s.id}" ${s.id === presetSpeciesId ? 'selected' : ''}>${s.name}</option>`).join('');

    document.getElementById('catch-modal-title').textContent = '새 기록 추가';
    document.getElementById('catch-edit-id').value = '';
    document.getElementById('catch-size').value   = '';
    document.getElementById('catch-weight').value = '';
    document.getElementById('catch-spot').value   = '';
    document.getElementById('catch-notes').value  = '';
    document.getElementById('catch-date').value   = new Date().toISOString().split('T')[0];

    modal.classList.remove('hidden');
    modal.classList.add('flex');
  }

  function editCatch(id, e) {
    e.stopImmediatePropagation();
    const item = catches.find(c => c.id === id);
    if (!item) return;

    const modal  = document.getElementById('catch-modal');
    const select = document.getElementById('catch-species');
    select.innerHTML = APP_DATA.species.map(s =>
      `<option value="${s.id}" ${s.id === item.speciesId ? 'selected' : ''}>${s.name}</option>`).join('');

    document.getElementById('catch-modal-title').textContent = '기록 수정';
    document.getElementById('catch-edit-id').value  = id;
    document.getElementById('catch-size').value     = item.size   || '';
    document.getElementById('catch-weight').value   = item.weight || '';
    document.getElementById('catch-spot').value     = item.spot   || '';
    document.getElementById('catch-notes').value    = item.notes  || '';
    document.getElementById('catch-date').value     = item.date   || new Date().toISOString().split('T')[0];

    modal.classList.remove('hidden');
    modal.classList.add('flex');
  }

  function hideCatchModal() {
    const modal = document.getElementById('catch-modal');
    modal.classList.remove('flex');
    modal.classList.add('hidden');
  }

  function saveCatch() {
    const speciesId = document.getElementById('catch-species').value;
    const size      = document.getElementById('catch-size').value;
    const weight    = document.getElementById('catch-weight').value;
    const spot      = document.getElementById('catch-spot').value.trim();
    const notes     = document.getElementById('catch-notes').value.trim();
    const date      = document.getElementById('catch-date').value || new Date().toISOString().split('T')[0];
    const editId    = document.getElementById('catch-edit-id').value;

    if (!speciesId) return showToast('어종을 선택해주세요');

    if (editId) {
      // 수정 모드
      const idx = catches.findIndex(c => c.id === parseInt(editId));
      if (idx !== -1) {
        catches[idx] = { ...catches[idx], speciesId, size: size ? parseInt(size) : null,
          weight: weight ? parseInt(weight) : null, spot, notes, date };
        saveCatchesToStorage();
        hideCatchModal();
        showToast('기록이 수정되었어요!');
        renderLog();
      }
    } else {
      // 신규 추가
      catches.unshift({ id: Date.now(), speciesId, size: size ? parseInt(size) : null,
        weight: weight ? parseInt(weight) : null, spot, notes, date });
      saveCatchesToStorage();
      hideCatchModal();
      showToast('기록이 저장되었어요!');
      renderLog();
    }
  }

  function deleteCatch(id, e) {
    e.stopImmediatePropagation();
    if (!confirm('이 기록을 삭제할까요?')) return;
    catches = catches.filter(c => c.id !== id);
    saveCatchesToStorage();
    renderLog();
    showToast('기록이 삭제되었습니다');
  }

  // ==================== INIT ====================
  function initApp() {
    setupPWA();
    loadCatches();
    loadSavedSpots();

    renderSpecies();
    renderTackle();
    renderSpots();
    renderLog();
    renderTodayRecommend();
    renderCharters();

    setTimeout(() => { updateTideInfo(); }, 300);

    showPage('page-home');

    document.documentElement.style.overflowX = 'hidden';
    document.body.style.overflowX = 'hidden';

    if (!localStorage.getItem('dunaki_welcomed_v3')) {
      setTimeout(() => {
        showToast('두낚이에 오신 걸 환영해요! 🎣');
        localStorage.setItem('dunaki_welcomed_v3', 'true');
      }, 1400);
    }
  }

  window.onload = initApp;
</script>
</body>
</html>
