<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="검색기">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<title>검색기</title>
<style>
:root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#191b1f;background:#f3f5f7;--card:#fff;--line:#e3e6ea;--muted:#68707b;--primary:#17191c;--soft:#eef1f4}
:root.dark{color:#f5f6f7;background:#101214;--card:#1b1e22;--line:#30343a;--muted:#a8afb8;--primary:#f4f5f6;--soft:#272b30}
*{box-sizing:border-box}body{margin:0;min-height:100dvh;padding:max(18px,env(safe-area-inset-top)) 14px max(18px,env(safe-area-inset-bottom));background:inherit;color:inherit}.hidden{display:none!important}
.screen{width:min(100%,560px);margin:auto}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:20px;box-shadow:0 12px 36px rgba(0,0,0,.06)}
.login{min-height:calc(100dvh - 36px);display:grid;place-items:center}.login .card{width:100%}.logo{width:54px;height:54px;border-radius:17px;background:var(--primary);color:var(--card);display:grid;place-items:center;font-size:25px;margin-bottom:16px}h1{font-size:25px;margin:0 0 8px}h2{font-size:17px;margin:0 0 12px}.desc{color:var(--muted);line-height:1.55;margin:0 0 20px}label{display:block;font-weight:750;font-size:14px;margin:0 0 8px}input{width:100%;height:49px;border:1px solid var(--line);background:var(--card);color:inherit;border-radius:14px;padding:0 14px;font-size:16px;outline:none}input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(100,100,100,.12)}button{border:0;border-radius:14px;min-height:48px;padding:0 15px;font-size:15px;font-weight:760;cursor:pointer}.primary{background:var(--primary);color:var(--card)}.secondary{background:var(--soft);color:inherit}.danger{background:#feecec;color:#a32929}.full{width:100%}.error{display:none;color:#b52a2a;font-size:14px;margin-top:10px}.status{min-height:22px;color:#347148;font-size:14px;margin-top:10px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.top h1{font-size:22px}.icon-btn{width:44px;min-height:44px;padding:0}.stack{display:grid;gap:13px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.section{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px}.row{display:flex;gap:8px;align-items:center}.row>*:first-child{flex:1}.list{display:grid;gap:8px}.item{display:flex;align-items:center;gap:9px;background:var(--soft);border-radius:13px;padding:11px}.item-main{min-width:0;flex:1}.item-title{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.item-sub{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.mini{min-height:36px;padding:0 11px;font-size:13px}.empty{font-size:14px;color:var(--muted);padding:8px 0}.setting-line{display:flex;align-items:center;justify-content:space-between;gap:14px}.setting-line+ .setting-line{margin-top:12px}.font-controls{display:flex;gap:6px}.note{font-size:12px;color:var(--muted);line-height:1.5;margin:8px 0 0}@media(max-width:380px){.grid2{grid-template-columns:1fr}.card{padding:17px}}
</style>
</head>
<body>
<section id="loginScreen" class="screen login">
 <div class="card">
  <div class="logo">⌕</div><h1>검색기</h1><p class="desc">비밀번호 인증 후 개인 설정을 사용할 수 있습니다.</p>
  <label for="login-password">비밀번호</label><input type="password" id="login-password" autocomplete="current-password" placeholder="비밀번호 입력">
  <div id="login-error" class="error"></div><button id="login-btn" class="primary full" style="margin-top:12px">로그인</button>
 </div>
</section>

<main id="appScreen" class="screen hidden">
 <div class="top"><h1>검색기</h1><button id="themeBtn" class="secondary icon-btn" aria-label="화면 모드">◐</button></div>
 <div class="stack">
  <section class="section">
   <label for="siteUrl">현재 주소</label><input id="siteUrl" type="url" inputmode="url" autocomplete="off" value="https://bookto20.com/">
   <div class="grid2" style="margin-top:10px"><button id="openBtn" class="primary">사이트 열기</button><button id="saveBtn" class="secondary">주소 저장</button></div>
   <div id="mainStatus" class="status"></div>
  </section>

  <section class="section">
   <h2>이어보기</h2><div id="continueBox" class="empty">아직 기록이 없습니다.</div>
  </section>

  <section class="section">
   <h2>새 주소 확인</h2>
   <div class="row"><input id="candidateUrl" type="url" inputmode="url" placeholder="새 주소를 붙여넣기"><button id="compareBtn" class="secondary">확인</button></div>
   <p class="note">외부 사이트에서 주소가 바뀌었을 때 새 주소를 붙여넣으면 현재 주소와 비교한 뒤 저장 여부를 확인합니다.</p>
  </section>

  <section class="section">
   <div class="setting-line"><h2 style="margin:0">즐겨찾기</h2><button id="addFavBtn" class="secondary mini">현재 주소 추가</button></div>
   <div id="favorites" class="list" style="margin-top:10px"></div>
  </section>

  <section class="section">
   <div class="setting-line"><h2 style="margin:0">최근 방문</h2><button id="clearHistoryBtn" class="secondary mini">기록 삭제</button></div>
   <div id="history" class="list" style="margin-top:10px"></div>
  </section>

  <section class="section">
   <h2>배너 정리 도구</h2>
   <button id="copyCleanerBtn" class="secondary full">Safari용 정리 스크립트 복사</button>
   <p class="note">Safari 북마크 주소에 붙여 넣고 대상 사이트에서 실행합니다. 사이트 구조에 따라 일부 요소는 남을 수 있습니다.</p>
  </section>

  <section class="section">
   <h2>설정</h2>
   <div class="setting-line"><span>화면 글자 크기</span><div class="font-controls"><button id="fontDown" class="secondary mini">작게</button><button id="fontUp" class="secondary mini">크게</button></div></div>
   <div class="setting-line"><span>내 설정 초기화</span><button id="resetBtn" class="danger mini">초기화</button></div>
   <div class="setting-line"><span>로그인 종료</span><button id="logoutBtn" class="secondary mini">로그아웃</button></div>
  </section>
 </div>
</main>
<script>
(()=>{
const AUTH_LOGIN_URL='https://wooow.qudrnr84.workers.dev/auth/login';
const TOKEN_KEY='bpw_session_token';
const STORE='searcher_pwa_state_v1';
const DEFAULT='https://bookto20.com/';
const $=id=>document.getElementById(id);
const state=Object.assign({url:DEFAULT,favorites:[],history:[],last:null,dark:false,font:16},load());
function load(){try{return JSON.parse(localStorage.getItem(STORE)||'{}')}catch{return {}}}
function persist(){localStorage.setItem(STORE,JSON.stringify(state))}
function cleanUrl(v){v=(v||'').trim();if(!v)return DEFAULT;if(!/^https?:\/\//i.test(v))v='https://'+v;const u=new URL(v);if(!['http:','https:'].includes(u.protocol))throw Error('지원하지 않는 주소입니다.');return u.href}
function showApp(){ $('loginScreen').classList.add('hidden');$('appScreen').classList.remove('hidden');render() }
function showLogin(){ $('appScreen').classList.add('hidden');$('loginScreen').classList.remove('hidden') }
async function login(){const btn=$('login-btn'),err=$('login-error'),pw=$('login-password').value.trim();if(!pw){err.textContent='비밀번호를 입력해주세요.';err.style.display='block';return}btn.disabled=true;btn.textContent='확인 중...';err.style.display='none';try{const r=await fetch(AUTH_LOGIN_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});const d=await r.json();if(r.ok&&d.ok&&d.token){sessionStorage.setItem(TOKEN_KEY,d.token);$('login-password').value='';showApp()}else throw Error('비밀번호가 올바르지 않습니다.')}catch(e){err.textContent=e.message==='비밀번호가 올바르지 않습니다.'?e.message:'연결 오류가 발생했습니다.';err.style.display='block'}finally{btn.disabled=false;btn.textContent='로그인'}}
function addHistory(url){state.history=state.history.filter(x=>x.url!==url);state.history.unshift({url,time:new Date().toISOString()});state.history=state.history.slice(0,10);state.last={url,time:new Date().toISOString()};persist()}
function openUrl(url){const u=cleanUrl(url);state.url=u;$('siteUrl').value=u;addHistory(u);render();location.href=u}
function itemHtml(x,type){const host=(()=>{try{return new URL(x.url).host}catch{return x.url}})();const time=x.time?new Date(x.time).toLocaleString('ko-KR'):'';return `<div class="item"><div class="item-main"><div class="item-title">${host}</div><div class="item-sub">${x.url}${time?' · '+time:''}</div></div><button class="secondary mini" data-open="${encodeURIComponent(x.url)}">열기</button>${type==='fav'?`<button class="danger mini" data-remove="${encodeURIComponent(x.url)}">삭제</button>`:''}</div>`}
function render(){document.documentElement.classList.toggle('dark',!!state.dark);document.documentElement.style.fontSize=state.font+'px';$('siteUrl').value=state.url||DEFAULT;$('favorites').innerHTML=state.favorites.length?state.favorites.map(x=>itemHtml(x,'fav')).join(''):'<div class="empty">즐겨찾기가 없습니다.</div>';$('history').innerHTML=state.history.length?state.history.map(x=>itemHtml(x,'history')).join(''):'<div class="empty">최근 방문 기록이 없습니다.</div>';$('continueBox').innerHTML=state.last?itemHtml(state.last,'history'):'아직 기록이 없습니다.';document.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>openUrl(decodeURIComponent(b.dataset.open)));document.querySelectorAll('[data-remove]').forEach(b=>b.onclick=()=>{const u=decodeURIComponent(b.dataset.remove);state.favorites=state.favorites.filter(x=>x.url!==u);persist();render()})}
$('login-btn').onclick=login;$('login-password').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
$('saveBtn').onclick=()=>{try{state.url=cleanUrl($('siteUrl').value);persist();render();$('mainStatus').textContent='주소를 저장했습니다.'}catch(e){$('mainStatus').textContent=e.message}};
$('openBtn').onclick=()=>{try{openUrl($('siteUrl').value)}catch(e){$('mainStatus').textContent=e.message}};
$('compareBtn').onclick=()=>{try{const old=cleanUrl(state.url),nu=cleanUrl($('candidateUrl').value);if(old===nu){alert('현재 저장된 주소와 같습니다.');return}if(confirm(`새 주소로 변경할까요?\n\n기존: ${old}\n새 주소: ${nu}`)){state.url=nu;persist();$('candidateUrl').value='';render();$('mainStatus').textContent='새 주소로 변경했습니다.'}}catch(e){alert(e.message)}};
$('addFavBtn').onclick=()=>{try{const u=cleanUrl($('siteUrl').value);if(!state.favorites.some(x=>x.url===u))state.favorites.unshift({url:u});persist();render()}catch(e){alert(e.message)}};
$('clearHistoryBtn').onclick=()=>{if(confirm('최근 방문 기록을 삭제할까요?')){state.history=[];state.last=null;persist();render()}};
$('themeBtn').onclick=()=>{state.dark=!state.dark;persist();render()};
$('fontDown').onclick=()=>{state.font=Math.max(14,state.font-1);persist();render()};$('fontUp').onclick=()=>{state.font=Math.min(20,state.font+1);persist();render()};
$('resetBtn').onclick=()=>{if(confirm('저장된 주소, 즐겨찾기, 방문 기록과 설정을 모두 초기화할까요?')){localStorage.removeItem(STORE);location.reload()}};
$('logoutBtn').onclick=()=>{sessionStorage.removeItem(TOKEN_KEY);showLogin()};
const cleaner=`javascript:(()=>{const q=['iframe','ins.adsbygoogle','[class*="banner" i]','[id*="banner" i]','[class*="advert" i]','[id*="advert" i]','[class*="popup" i]','[id*="popup" i]','[class*="floating" i]','[id*="floating" i]'];let n=0;q.forEach(s=>document.querySelectorAll(s).forEach(e=>{const t=((e.innerText||'')+' '+(e.getAttribute('aria-label')||''));if(s==='iframe'||s==='ins.adsbygoogle'||/광고|banner|advert|popup|배너/i.test(t)){e.style.setProperty('display','none','important');n++}}));document.documentElement.style.setProperty('overflow','auto','important');document.body.style.setProperty('overflow','auto','important');alert('정리 완료: '+n+'개 요소 숨김')})()`;
$('copyCleanerBtn').onclick=async()=>{try{await navigator.clipboard.writeText(cleaner);alert('정리 스크립트를 복사했습니다.')}catch{const t=document.createElement('textarea');t.value=cleaner;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();alert('정리 스크립트를 복사했습니다.')}};
if(sessionStorage.getItem(TOKEN_KEY))showApp();else showLogin();
if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
})();
</script>
</body></html>
